<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Poortjie Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (window.console && window.console.log) {
            const originalLog = window.console.log;
            window.console.log = function() {
                if (arguments[0] && typeof arguments[0] === 'string' && (arguments[0].includes('cdn.tailwindcss.com should not be used in production') || arguments[0].includes('Tailwind CSS: You should not use the CDN'))) return;
                originalLog.apply(window.console, arguments);
            };
        }
    </script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" type="image/png" sizes="48x48" href="../../favicon/kasilayn/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="96x96" href="../../favicon/kasilayn/favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="../../favicon/kasilayn/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="../../favicon/kasilayn/apple-touch-icon.png">
    <link rel="manifest" href="../../favicon/kasilayn/site.webmanifest">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../../scripts/firebase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="../../scripts/theme.js" defer></script>
</head>
<body class="font-sans antialiased bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">

<header class="max-w-4xl mx-auto pt-10 pb-6 px-6 flex justify-between items-center">
    <div class="flex items-center gap-4">
        <button onclick="window.location.href='dashboard.html'" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="text-xl font-black uppercase tracking-tight">My Bookings</h1>
    </div>

    <!-- Hamburger Menu consistent with home.html -->
    <div id="hamburger-menu" class="relative z-50">
        <button id="hamburger-btn" class="p-3 rounded-full bg-green-600 text-white shadow-lg hover:bg-green-700 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        <div id="menu-items" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl py-2 ring-1 ring-black ring-opacity-5 border border-slate-100 dark:border-slate-700">
            <button id="menu-theme-toggle" class="w-full text-left px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center gap-3">
                <span id="menu-theme-icon">🌓</span> Mode
            </button>
            <div class="border-t border-gray-100 dark:border-slate-700 my-1"></div>
            <a href="dashboard.html" class="block w-full text-left px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center gap-3">
                <i class="fas fa-th-large w-4 text-center"></i> Dashboard
            </a>
            <a href="../../index.html" class="block w-full text-left px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center gap-3">
                <i class="fas fa-home w-4 text-center"></i> Home
            </a>
            <button id="logout-btn" class="hidden w-full text-left px-4 py-2 text-xs font-bold uppercase tracking-widest text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-3">
                <i class="fas fa-sign-out-alt w-4 text-center"></i> Logout
            </button>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto px-6 pb-24 space-y-6">
    <div id="loader-overlay" class="fixed inset-0 bg-white/80 dark:bg-slate-900/80 z-[100] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="animate-spin h-10 w-10 border-4 border-green-500 border-t-transparent rounded-full mb-4"></div>
        <p class="text-sm font-bold uppercase tracking-widest animate-pulse">Loading Bookings...</p>
    </div>

    <!-- Active Trips Section -->
    <section>
        <div class="flex items-center gap-4 mb-4">
            <span class="w-1 h-4 bg-green-500 rounded-full"></span>
            <h2 class="text-[10px] font-black uppercase tracking-widest opacity-40">Active & Pending</h2>
        </div>
        <div id="active-list" class="space-y-4">
            <!-- Injected via JS -->
        </div>
        <div id="empty-active" class="hidden text-center py-8 opacity-30 italic text-sm">No active trips.</div>
    </section>

    <!-- Past Trips Section -->
    <section>
        <div class="flex items-center gap-4 mb-4">
            <span class="w-1 h-4 bg-slate-400 rounded-full"></span>
            <h2 class="text-[10px] font-black uppercase tracking-widest opacity-40">History</h2>
        </div>
        <div id="history-list" class="space-y-4 opacity-75">
            <!-- Injected via JS -->
        </div>
        <div id="empty-history" class="hidden text-center py-8 opacity-30 italic text-sm">No past trips found.</div>
    </section>
</main>

<!-- Rating Modal -->
<div id="rating-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden animate-fadeIn p-8 text-center space-y-6">
        <h2 class="text-xl font-black uppercase tracking-tight">Rate Your Driver</h2>
        <p class="text-xs opacity-60">How was your trip with <span id="rate-driver-name" class="font-bold">--</span>?</p>

        <div class="flex justify-center gap-2 text-3xl text-slate-300" id="star-container">
            <i class="fas fa-star cursor-pointer hover:text-amber-400 transition" data-val="1"></i>
            <i class="fas fa-star cursor-pointer hover:text-amber-400 transition" data-val="2"></i>
            <i class="fas fa-star cursor-pointer hover:text-amber-400 transition" data-val="3"></i>
            <i class="fas fa-star cursor-pointer hover:text-amber-400 transition" data-val="4"></i>
            <i class="fas fa-star cursor-pointer hover:text-amber-400 transition" data-val="5"></i>
        </div>

        <textarea id="rating-comment" rows="3" placeholder="Leave a comment (optional)..." class="w-full bg-slate-50 dark:bg-slate-900/50 border-2 border-transparent focus:border-amber-400 rounded-2xl px-4 py-3 text-xs font-bold outline-none transition resize-none"></textarea>

        <div class="flex gap-3">
            <button onclick="closeRatingModal()" class="flex-1 py-3 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-700 transition">Skip</button>
            <button onclick="submitRating()" class="flex-1 py-3 bg-amber-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-amber-600 transition shadow-lg shadow-amber-500/20">Submit</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let currentRating = 0;
    let currentTripId = null;
    let currentDriverUid = null;

    // Initialize Hamburger Menu and Logout
    document.addEventListener('DOMContentLoaded', () => {
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const menuItems = document.getElementById('menu-items');

        if (hamburgerBtn && menuItems) {
            hamburgerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                menuItems.classList.toggle('hidden');
            });

            document.addEventListener('click', () => {
                menuItems.classList.add('hidden');
            });

            menuItems.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }

        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                firebase.auth().signOut().then(() => {
                    window.location.href = '../../authentication/login.html';
                });
            });
        }

        // Star Rating Logic
        const stars = document.querySelectorAll('#star-container i');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const val = parseInt(star.getAttribute('data-val'));
                currentRating = val;
                stars.forEach(s => {
                    const sVal = parseInt(s.getAttribute('data-val'));
                    if (sVal <= val) {
                        s.classList.add('text-amber-400');
                        s.classList.remove('text-slate-300');
                    } else {
                        s.classList.remove('text-amber-400');
                        s.classList.add('text-slate-300');
                    }
                });
            });
        });
    });

    firebase.auth().onAuthStateChanged(user => {
        const logoutBtn = document.getElementById('logout-btn');
        if (!user) {
            if (logoutBtn) logoutBtn.classList.add('hidden');
            sessionStorage.setItem('redirectUrl', window.location.href);
            window.location.href = '../../authentication/login.html';
            return;
        }
        currentUser = user;
        if (logoutBtn) logoutBtn.classList.remove('hidden');
        loadBookings();
    });

    function loadBookings() {
        db.collection('kasilayn').doc('fleet').collection('bookings')
            .where('requesterUid', '==', currentUser.uid)
            .orderBy('createdAt', 'desc')
            .onSnapshot(snapshot => {
                const activeList = document.getElementById('active-list');
                const historyList = document.getElementById('history-list');

                activeList.innerHTML = '';
                historyList.innerHTML = '';

                let hasActive = false;
                let hasHistory = false;

                snapshot.forEach(doc => {
                    const trip = doc.data();
                    const tripId = doc.id;
                    const status = trip.status || 'PENDING';
                    const isHistory = ['COMPLETED', 'CANCELLED'].includes(status);

                    const card = createTripCard(trip, tripId, status);

                    if (isHistory) {
                        historyList.appendChild(card);
                        hasHistory = true;
                    } else {
                        activeList.appendChild(card);
                        hasActive = true;
                    }
                });

                document.getElementById('empty-active').classList.toggle('hidden', hasActive);
                document.getElementById('empty-history').classList.toggle('hidden', hasHistory);
                document.getElementById('loader-overlay').classList.add('hidden');
            }, error => {
                console.error("Error loading bookings:", error);
                document.getElementById('loader-overlay').classList.add('hidden');
            });
    }

    function createTripCard(trip, tripId, status) {
        const div = document.createElement('div');
        div.className = 'card p-6 rounded-[2rem] bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 relative overflow-hidden';

        let statusColor = 'bg-yellow-500';
        let statusText = 'Pending';

        if (status === 'ACCEPTED') { statusColor = 'bg-blue-500'; statusText = 'Driver on the way'; }
        if (status === 'ON_TRIP') { statusColor = 'bg-emerald-500'; statusText = 'On Trip'; }
        if (status === 'COMPLETED') { statusColor = 'bg-slate-500'; statusText = 'Completed'; }
        if (status === 'CANCELLED') { statusColor = 'bg-red-500'; statusText = 'Cancelled'; }

        const date = trip.createdAt ? new Date(trip.createdAt.seconds * 1000).toLocaleDateString() : 'Just now';

        div.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="font-black text-sm uppercase tracking-tight">${trip.driverDisplayName || 'Driver'}</h3>
                    <p class="text-[10px] opacity-50 font-bold uppercase tracking-wider">${date}</p>
                </div>
                <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest text-white ${statusColor}">
                    ${statusText}
                </span>
            </div>

            <div class="grid grid-cols-1 gap-3 pl-2 border-l-2 border-dashed border-slate-200 dark:border-slate-700 ml-1 mb-4">
                <div class="relative">
                    <div class="absolute -left-[13px] top-1 w-2 h-2 rounded-full bg-green-500"></div>
                    <p class="text-[9px] font-black uppercase opacity-40 tracking-widest">Pickup</p>
                    <p class="text-xs font-bold truncate">${trip.pickupShort || trip.pickup}</p>
                </div>
                <div class="relative">
                    <div class="absolute -left-[13px] top-1 w-2 h-2 rounded-full bg-red-500"></div>
                    <p class="text-[9px] font-black uppercase opacity-40 tracking-widest">Destination</p>
                    <p class="text-xs font-bold truncate">${trip.destinationShort || trip.destination}</p>
                </div>
            </div>

            <div class="flex justify-between items-center pt-2 border-t border-slate-50 dark:border-slate-700/50">
                <p class="text-lg font-black text-green-600">R ${trip.estimatedFare}</p>

                ${status === 'PENDING' ? `
                    <button onclick="cancelTrip('${tripId}')" class="px-4 py-2 bg-red-50 text-red-600 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-red-100 transition">Cancel</button>
                ` : ''}

                ${status === 'COMPLETED' && !trip.rating ? `
                    <button onclick="openRatingModal('${tripId}', '${trip.driverUid}', '${trip.driverDisplayName}')" class="px-4 py-2 bg-amber-100 text-amber-600 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-amber-200 transition">Rate</button>
                ` : ''}

                ${status === 'COMPLETED' && trip.rating ? `
                    <div class="flex gap-0.5 text-amber-400 text-xs">
                        ${Array(5).fill(0).map((_, i) => `<i class="${i < trip.rating ? 'fas' : 'far'} fa-star"></i>`).join('')}
                    </div>
                ` : ''}
            </div>
        `;
        return div;
    }

    async function cancelTrip(tripId) {
        if (!confirm("Are you sure you want to cancel this request?")) return;

        try {
            await db.collection('kasilayn').doc('fleet').collection('bookings').doc(tripId).update({
                status: 'CANCELLED',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch (e) {
            console.error("Error cancelling trip:", e);
            alert("Failed to cancel trip.");
        }
    }

    function openRatingModal(tripId, driverUid, driverName) {
        currentTripId = tripId;
        currentDriverUid = driverUid;
        currentRating = 0;
        document.getElementById('rate-driver-name').textContent = driverName;
        document.getElementById('rating-comment').value = '';

        // Reset stars
        document.querySelectorAll('#star-container i').forEach(s => {
            s.classList.remove('text-amber-400');
            s.classList.add('text-slate-300');
        });

        document.getElementById('rating-modal').classList.remove('hidden');
    }

    function closeRatingModal() {
        document.getElementById('rating-modal').classList.add('hidden');
    }

    async function submitRating() {
        if (currentRating === 0) {
            alert("Please select a star rating.");
            return;
        }

        const comment = document.getElementById('rating-comment').value.trim();

        try {
            // 1. Update Booking
            await db.collection('kasilayn').doc('fleet').collection('bookings').doc(currentTripId).update({
                rating: currentRating,
                ratingComment: comment
            });

            // 2. Update Driver Stats (Atomic Transaction)
            await db.runTransaction(async (transaction) => {
                const driverRef = db.collection('kasilayn').doc('fleet').collection('drivers').doc(currentDriverUid);
                const driverDoc = await transaction.get(driverRef);

                if (driverDoc.exists) {
                    const data = driverDoc.data();
                    const stats = data.stats || { rating: 5.0, totalRatings: 0 };

                    const newTotal = (stats.totalRatings || 0) + 1;
                    // Calculate new average
                    const currentSum = (stats.rating || 5.0) * (stats.totalRatings || 0);
                    const newAvg = (currentSum + currentRating) / newTotal;

                    transaction.update(driverRef, {
                        'stats.rating': newAvg,
                        'stats.totalRatings': newTotal
                    });
                }
            });

            closeRatingModal();
            alert("Thank you for your feedback!");

        } catch (e) {
            console.error("Error submitting rating:", e);
            alert("Failed to submit rating.");
        }
    }
</script>
</body>
</html>
